name: Bio-Climate CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema (GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev g++

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar datos sintéticos (TIF)
        run: |
          python scripts/generate_sample_ssp.py

      - name: Prueba de Integración (Smoke Test)
        # Ejecutamos el main.py por 15 segundos para verificar que la API inicia
        # Si no falla en 15s, asumimos que el workflow es exitoso.
        run: |
          timeout 15s python workflows/main.py || code=$?; 
          if [ $code -eq 124 ]; then 
            echo "La API inició correctamente y los datos fueron procesados."; 
            exit 0; 
          else 
            echo "El workflow falló con código $code"; 
            exit $code; 
          fi
